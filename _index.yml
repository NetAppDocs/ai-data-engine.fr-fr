indexpage:
  title: Documentation AI Data Engine
  summary: La documentation AI Data Engine fournit des informations complètes sur
    l'installation, la configuration et la gestion des systèmes AIDE, notamment le
    catalogage des métadonnées, la gestion de l'espace de travail, la collecte de
    données et l'intégration avec les flux de travail AI/ML.
  keywords: aide, ai data engine, ontap, metadata engine, workspaces, data collections,
    vector database, guardrails, dcn, data compute nodes
  lead: NetApp AI Data Engine (AIDE) est une plateforme d'entreprise conçue pour accélérer
    et simplifier le traitement des données, la gestion et la gouvernance pilotés
    par l'IA. AIDE transforme les données non structurées en ensembles de données
    structurés, prêts pour l'IA, destinés aux charges de travail d'apprentissage automatique
    et d'IA générative.
